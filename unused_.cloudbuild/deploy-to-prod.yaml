steps:
  - name: "gcr.io/cloud-builders/gcloud"
    id: install-dependencies
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        curl -LsSf https://astral.sh/uv/0.11.7/install.sh | sh
        export PATH="$$HOME/.local/bin:$$PATH"
        uv sync --locked

  - name: "gcr.io/cloud-builders/gcloud"
    id: trigger-deployment
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        export PATH="$$HOME/.local/bin:$$PATH"
        uvx google-agents-cli deploy \
          --project ${_PROD_PROJECT_ID} \
          --region ${_REGION} \
          --service-account=${_APP_SERVICE_ACCOUNT_PROD} \
          --update-env-vars="COMMIT_SHA=${COMMIT_SHA},LOGS_BUCKET_NAME=${_LOGS_BUCKET_NAME_PROD}"

substitutions:
  _PROD_PROJECT_ID: YOUR_PROD_PROJECT_ID
  _REGION: us-east1

logsBucket: gs://${PROJECT_ID}-pgraph-platform-logs/build-logs
options:
  env:
    - 'UV_PYTHON=3.12'
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
